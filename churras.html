/* ─── MSAL / SHAREPOINT ─── */
let msalApp=null;

async function msalInit(clientId){
  if(msalApp)return;
  // Detect redirect URI: if hosted on SharePoint use current URL, else localhost
  const redirectUri="https://eandersontorres.github.io/torresbee-app/churras.html";
  msalApp=new msal.PublicClientApplication({
    auth:{clientId,authority:"https://login.microsoftonline.com/common",redirectUri},
    cache:{cacheLocation:"localStorage",storeAuthStateInCookie:false}
  });
  await msalApp.initialize();
}

async function getToken(){
  if(!msalApp)throw new Error("MSAL não inicializado");
  const scopes=["Sites.ReadWrite.All","User.Read"];
  const accounts=msalApp.getAllAccounts();
  if(accounts.length>0){
    try{const r=await msalApp.acquireTokenSilent({scopes,account:accounts[0]});return r.accessToken;}catch(e){}
  }
  const r=await msalApp.acquireTokenPopup({scopes});
  return r.accessToken;
}

async function spLogin(clientId){
  await msalInit(clientId);
  const scopes=["Sites.ReadWrite.All","User.Read"];
  const accounts=msalApp.getAllAccounts();
  if(accounts.length>0){
    try{const r=await msalApp.acquireTokenSilent({scopes,account:accounts[0]});return accounts[0];}catch(e){}
  }
  const r=await msalApp.loginPopup({scopes});
  return r.account;
}

async function spGetSiteId(siteUrl){
  // siteUrl like: torresbee.sharepoint.com:/sites/TorresBeeTaskManagement
  const token=await getToken();
  const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteUrl}`,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)throw new Error("Site não encontrado: "+r.status);
  const d=await r.json();
  return d.id;
}

async function spEnsureList(siteId, listName){
  const token=await getToken();
  // Check if list exists
  const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists?$filter=displayName eq '${listName}'`,{headers:{Authorization:`Bearer ${token}`}});
  const d=await r.json();
  if(d.value&&d.value.length>0)return d.value[0].id;
  // Create list
  const cr=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists`,{
    method:"POST",
    headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({displayName:listName,list:{template:"genericList"},columns:[{name:"AppData",text:{allowMultipleLines:true}}]})
  });
  if(!cr.ok)throw new Error("Falha ao criar lista: "+cr.status);
  const cd=await cr.json();
  return cd.id;
}

async function spRead(siteId, listId){
  const token=await getToken();
  const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items?$expand=fields&$top=1&$orderby=createdDateTime desc`,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)throw new Error("Leitura falhou: "+r.status);
  const d=await r.json();
  if(!d.value||d.value.length===0)return null;
  const raw=d.value[0].fields?.AppData;
  if(!raw)return null;
  return{data:JSON.parse(raw),itemId:d.value[0].id};
}

async function spWrite(siteId, listId, state, existingItemId){
  const token=await getToken();
  const payload=JSON.stringify({...state,savedDate:new Date().toDateString()});
  if(existingItemId){
    const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items/${existingItemId}/fields`,{
      method:"PATCH",
      headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
      body:JSON.stringify({AppData:payload})
    });
    if(!r.ok)throw new Error("Update falhou: "+r.status);
  } else {
    const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items`,{
      method:"POST",
      headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
      body:JSON.stringify({fields:{Title:"TorresBeeData",AppData:payload}})
    });
    if(!r.ok)throw new Error("Create falhou: "+r.status);
    const d=await r.json();
    return d.id;
  }
}

        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} title={tabLabels[t.id]} style={{flex:1,padding:"11px 2px",fontSize:16,color:tab===t.id?C.gold:C.textMuted,background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?C.gold:"transparent"}`,cursor:"pointer",transition:"all 0.2s"}}>{t.l}</button>
        ))}
      </div>
      {/* Content */}
      <div style={{flex:1,padding:"12px 14px 90px",overflowY:"auto"}}>
        {tab==="dashboard"&&<MgrDash tasks={tasks} taskStatus={taskStatus} shiftTasks={shiftTasks} done={done} pct={pct} employees={employees} notifAlerts={notifAlerts} shift={shift}/>}
        {tab==="checklist"&&<div className="fi">
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:4}}>
            {allCats.map(c=><button key={c} onClick={()=>setFilterCat(c)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:`1px solid ${filterCat===c?C.gold:C.border}`,background:filterCat===c?C.goldDim:"transparent",color:filterCat===c?C.gold:C.textMuted,whiteSpace:"nowrap"}}>{c==="todas"?"Todas":`${CATICON[c]||"📋"} ${c}`}</button>)}
          </div>
          {filtered.map(t=><MgrTaskCard key={t.id} task={t} status={taskStatus[t.id]} onDelete={()=>removeTask(t.id)} employees={employees}/>)}
          {filtered.length===0&&<div style={{textAlign:"center",color:C.textMuted,padding:40}}>Nenhuma tarefa.</div>}
        </div>}
        {tab==="gestao"&&<TaskManager mgmtTasks={mgmtTasks} setMgmtTasks={setMgmtTasks} employees={employees}/>}
        {tab==="equipe"&&<TeamTab employees={employees} setEmployees={setEmployees} tasks={tasks} taskStatus={taskStatus}/>}
        {tab==="historico"&&<MgrHistory tasks={tasks} taskStatus={taskStatus} employees={employees}/>}
      </div>
      <button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:32,right:18,width:54,height:54,borderRadius:"50%",background:C.gold,border:"none",fontSize:28,cursor:"pointer",zIndex:100,color:"#100900",fontWeight:900}}>+</button>
      {showAdd&&<AddTaskModal task={nTask} setTask={setNTask} onSave={addTask} onClose={()=>setShowAdd(false)} employees={employees}/>}
      {syncBar}
    </div></div>
  );
}

function MgrDash({tasks,taskStatus,shiftTasks,done,pct,employees,notifAlerts,shift}){
  const ot=tasks.filter(t=>t.shift==="abertura"),ct=tasks.filter(t=>t.shift==="fechamento");
  const od=ot.filter(t=>taskStatus[t.id]?.completed).length,cd=ct.filter(t=>taskStatus[t.id]?.completed).length;
  const allDone=Object.keys(taskStatus).filter(k=>taskStatus[k]?.completed).length;
  return(<div className="fi">
    <div style={{...cardS,background:pct===100?"#061A0A":C.goldDim,border:`1px solid ${pct===100?C.green+"44":C.gold+"33"}`,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:pct===100?C.green:C.goldLight,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{shift==="abertura"?"☀️ Abertura":"🌙 Fechamento"} – Progresso</div>
          <div style={{fontSize:40,fontWeight:800,lineHeight:1}}>{pct}<span style={{fontSize:18,color:C.textMuted}}>%</span></div>
          <div style={{fontSize:13,color:C.textMuted,marginTop:4}}>{done} de {shiftTasks.length} tarefas</div>
        </div>
        <div style={{fontSize:48}}>{pct===100?"🎉":pct>70?"💪":pct>40?"⚡":"🔥"}</div>
      </div>
      <PBar pct={pct}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      {[{l:"Abertura",v:`${od}/${ot.length}`,i:"☀️",c:C.gold},{l:"Fechamento",v:`${cd}/${ct.length}`,i:"🌙",c:C.blue},{l:"Notif. Atraso",v:notifAlerts.length,i:"⏰",c:notifAlerts.length>0?C.red:C.green},{l:"Concluídas hoje",v:allDone,i:"✅",c:C.green}].map(s=>(
        <div key={s.l} style={{...cardS,marginBottom:0}}><div style={{fontSize:22,marginBottom:5}}>{s.i}</div><div style={{fontSize:26,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:12,color:C.textMuted,fontWeight:600}}>{s.l}</div></div>
      ))}
    </div>
    <div style={cardS}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>👥 Equipe</div>
      {employees.filter(e=>e.active).map(emp=>{
        const et=tasks.filter(t=>t.assignedTo===emp.id),ed=et.filter(t=>taskStatus[t.id]?.completed).length;
        const ep=et.length?Math.round((ed/et.length)*100):0;
        return(<div key={emp.id} style={{marginBottom:13}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:26,height:26,borderRadius:"50%",background:C.greenDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.greenLight}}>{initials(emp.name)}</div><span>{emp.name}</span></div>
            <span style={{color:C.textMuted}}>{ed}/{et.length}</span>
          </div>
          <PBar pct={ep}/>
        </div>);
      })}
    </div>
  </div>);
}

/* ─── TASK MANAGER ─── */
function TaskManager({mgmtTasks,setMgmtTasks,employees}){
  const[viewMode,setViewMode]=useState("kanban");
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null);
  const[detail,setDetail]=useState(null);
  const[filterSt,setFilterSt]=useState("all");
  const[newComment,setNewComment]=useState("");
  const blank={name:"",deadline:"",why:"",priority:"media",status:"todo",assignedTo:"",comments:[]};
  const[form,setForm]=useState({...blank});

  function openAdd(){setForm({...blank});setEditId(null);setShowForm(true);}
  function openEdit(t){setForm({...t});setEditId(t.id);setShowForm(true);}
  function save(){
    if(!form.name.trim())return;
    if(editId){setMgmtTasks(p=>p.map(t=>t.id===editId?{...form}:t));}
    else{setMgmtTasks(p=>[...p,{...form,id:"mt"+Date.now(),createdAt:new Date().toLocaleString("pt-BR"),comments:[]}]);}
    setShowForm(false);setDetail(null);
  }
  function del(id){if(!window.confirm("Remover?"))return;setMgmtTasks(p=>p.filter(t=>t.id!==id));setDetail(null);}
  function moveStatus(id,st){setMgmtTasks(p=>p.map(t=>t.id===id?{...t,status:st}:t));setDetail(p=>p?{...p,status:st}:p);}
  function addComment(taskId){
    if(!newComment.trim())return;
    const c={id:Date.now(),text:newComment,at:new Date().toLocaleString("pt-BR")};
    setMgmtTasks(p=>p.map(t=>t.id===taskId?{...t,comments:[...(t.comments||[]),c]}:t));
    setDetail(p=>p?{...p,comments:[...(p.comments||[]),c]}:p);
    setNewComment("");
  }
  function isOD(t){return t.deadline&&new Date(t.deadline)<new Date()&&t.status!=="done";}

  const displayed=filterSt==="all"?mgmtTasks:mgmtTasks.filter(t=>t.status===filterSt);
  const countBy=s=>mgmtTasks.filter(t=>t.status===s).length;

  function MiniCard({task}){
    const sm=STATUS_META[task.status]||STATUS_META.todo;
    const pm=PRIORITY_META[task.priority]||PRIORITY_META.media;
    const emp=employees.find(e=>e.id===task.assignedTo);
    const od=isOD(task);
    return(<div onClick={()=>setDetail({...task,comments:task.comments||[]})} style={{background:C.card,border:`1px solid ${od?"#E05050":sm.color}22`,borderLeft:`3px solid ${od?"#E05050":sm.color}`,borderRadius:12,padding:"12px 13px",marginBottom:7,cursor:"pointer"}} className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:14,lineHeight:1.3,marginBottom:5}}>{task.name}</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:700,color:pm.color,background:`${pm.color}22`,padding:"2px 8px",borderRadius:20}}>{pm.label}</span>
            {od&&<span style={{fontSize:11,fontWeight:700,color:C.red,background:C.redDim,padding:"2px 8px",borderRadius:20}}>⚠️ Atrasada</span>}
            {(task.comments||[]).length>0&&<span style={{fontSize:11,color:C.textMuted}}>💬 {task.comments.length}</span>}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0,fontSize:11,color:od?C.red:C.textMuted}}>
          {task.deadline&&<div>📅 {new Date(task.deadline).toLocaleDateString("pt-BR")}</div>}
          {emp&&<div style={{marginTop:3}}>👤 {emp.name.split(" ")[0]}</div>}
        </div>
      </div>
    </div>);
  }

  return(<div className="fi">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontWeight:800,fontSize:15}}>📌 Gestão de Tarefas</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setViewMode(v=>v==="kanban"?"lista":"kanban")} style={{padding:"7px 13px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${C.border}`,background:"transparent",color:C.textMuted}}>{viewMode==="kanban"?"☰ Lista":"⊞ Kanban"}</button>
        <button onClick={openAdd} style={{padding:"7px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"none",background:C.gold,color:"#100900"}}>+ Nova</button>
      </div>
    </div>
    <div style={{display:"flex",gap:7,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
      {[{v:"all",l:`Todas (${mgmtTasks.length})`},...Object.entries(STATUS_META).map(([k,m])=>({v:k,l:`${m.icon} ${m.label} (${countBy(k)})`}))].map(o=>(
        <button key={o.v} onClick={()=>setFilterSt(o.v)} style={{padding:"6px 13px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",border:`1px solid ${filterSt===o.v?C.gold:C.border}`,background:filterSt===o.v?C.goldDim:"transparent",color:filterSt===o.v?C.gold:C.textMuted}}>{o.l}</button>
      ))}
    </div>

    {viewMode==="kanban"&&(<div>
      {Object.entries(STATUS_META).map(([sKey,sm])=>{
        const col=displayed.filter(t=>t.status===sKey);
        return(<div key={sKey} style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
            <div style={{width:9,height:9,borderRadius:"50%",background:sm.color}}/>
            <span style={{fontSize:12,fontWeight:700,color:sm.color,textTransform:"uppercase",letterSpacing:0.5}}>{sm.label}</span>
            <span style={{fontSize:11,color:C.textDim,background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"1px 7px"}}>{col.length}</span>
          </div>
          {col.length===0&&<div style={{color:C.textDim,fontSize:12,padding:"8px 0",borderTop:`1px dashed ${C.border}`,textAlign:"center"}}>Vazio</div>}
          {col.map(t=><MiniCard key={t.id} task={t}/>)}
        </div>);
      })}
    </div>)}

    {viewMode==="lista"&&(<div>
      {displayed.length===0&&<div style={{textAlign:"center",color:C.textMuted,padding:40}}>Nenhuma tarefa.</div>}
      {displayed.map(t=>{
        const sm=STATUS_META[t.status]||STATUS_META.todo,emp=employees.find(e=>e.id===t.assignedTo),od=isOD(t);
        return(<div key={t.id} onClick={()=>setDetail({...t,comments:t.comments||[]})} style={{background:C.card,border:`1px solid ${od?C.red+"33":C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:7,cursor:"pointer",display:"flex",alignItems:"center",gap:12}} className="fi">
          <div style={{width:9,height:9,borderRadius:"50%",background:sm.color,flexShrink:0}}/>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{t.name}</div><div style={{fontSize:12,color:C.textMuted,marginTop:3}}>{t.deadline&&<span>📅 {new Date(t.deadline).toLocaleDateString("pt-BR")} · </span>}{emp&&<span>👤 {emp.name.split(" ")[0]} · </span>}<span style={{color:sm.color}}>{sm.icon} {sm.label}</span></div></div>
          <span style={{color:C.textDim,fontSize:16}}>›</span>
        </div>);
      })}
    </div>)}

    {/* Detail Modal */}
    {detail&&(()=>{
      const sm=STATUS_META[detail.status]||STATUS_META.todo;
      const pm=PRIORITY_META[detail.priority]||PRIORITY_META.media;
      const emp=employees.find(e=>e.id===detail.assignedTo);
      const od=isOD(detail);
      const full=mgmtTasks.find(t=>t.id===detail.id)||detail;
      return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={e=>e.target===e.currentTarget&&setDetail(null)}>
        <div style={{background:C.surface,borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",padding:"20px 18px 48px",border:`1px solid ${C.border}`}} className="fi">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div style={{flex:1,marginRight:10}}>
              <div style={{fontSize:17,fontWeight:800,lineHeight:1.3,marginBottom:8}}>{full.name}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:12,fontWeight:700,color:sm.color,background:sm.bg,padding:"3px 10px",borderRadius:20}}>{sm.icon} {sm.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:pm.color,background:`${pm.color}22`,padding:"3px 10px",borderRadius:20}}>{pm.label}</span>
                {od&&<span style={{fontSize:12,fontWeight:700,color:C.red,background:C.redDim,padding:"3px 10px",borderRadius:20}}>⚠️ Atrasada</span>}
              </div>
            </div>
            <button onClick={()=>setDetail(null)} style={{background:"none",border:"none",color:C.textMuted,fontSize:22,cursor:"pointer",flexShrink:0}}>✕</button>
          </div>
          <div style={{background:C.card,borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${C.border}`}}>
            {full.deadline&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.textMuted}}>📅 Deadline</span><span style={{fontSize:13,fontWeight:600,color:od?C.red:C.text}}>{new Date(full.deadline).toLocaleDateString("pt-BR",{weekday:"short",day:"numeric",month:"short"})}</span></div>}
            {emp&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.textMuted}}>👤 Responsável</span><span style={{fontSize:13,fontWeight:600}}>{emp.name}</span></div>}
            {full.createdAt&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span style={{fontSize:13,color:C.textMuted}}>🕐 Criada</span><span style={{fontSize:13,color:C.textMuted}}>{full.createdAt}</span></div>}
          </div>
          {full.why&&<div style={{marginBottom:14}}><label style={lbl}>💡 Motivo / Contexto</label><div style={{background:C.card,borderRadius:10,padding:"12px 14px",fontSize:13,color:C.textMuted,lineHeight:1.7,border:`1px solid ${C.border}`}}>{full.why}</div></div>}
          <div style={{marginBottom:14}}>
            <label style={lbl}>Mover para</label>
            <div style={{display:"flex",gap:7}}>
              {Object.entries(STATUS_META).map(([k,m])=><button key={k} onClick={()=>moveStatus(full.id,k)} style={{flex:1,padding:"9px 4px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${full.status===k?m.color:C.border}`,background:full.status===k?m.bg:"transparent",color:full.status===k?m.color:C.textMuted}}>{m.icon}<br/><span style={{fontSize:10}}>{m.label}</span></button>)}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={lbl}>💬 Comentários ({(full.comments||[]).length})</label>
            {(full.comments||[]).map(c=><div key={c.id} style={{background:C.card,borderRadius:10,padding:"10px 12px",marginBottom:7,border:`1px solid ${C.border}`}}><div style={{fontSize:13,color:C.textMuted,lineHeight:1.6}}>{c.text}</div><div style={{fontSize:11,color:C.textDim,marginTop:4}}>{c.at}</div></div>)}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input style={{...inp,flex:1}} placeholder="Adicionar comentário..." value={newComment} onChange={e=>setNewComment(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addComment(full.id)}/>
              <button onClick={()=>addComment(full.id)} style={{padding:"10px 16px",borderRadius:10,background:C.gold,border:"none",fontWeight:700,fontSize:13,cursor:"pointer",color:"#100900"}}>→</button>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{openEdit(full);setDetail(null);}} style={{flex:1,padding:"11px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",border:`1px solid ${C.border}`,background:"transparent",color:C.textMuted}}>✏️ Editar</button>
            <button onClick={()=>del(full.id)} style={{flex:1,padding:"11px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",border:`1px solid ${C.redDim}`,background:C.redDim,color:C.red}}>🗑 Remover</button>
          </div>
        </div>
      </div>);
    })()}

    {/* Add/Edit Form */}
    {showForm&&(()=>{
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div style={{background:C.surface,borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"88vh",display:"flex",flexDirection:"column",border:`1px solid ${C.border}`}} className="fi">
            {/* Fixed header */}
            <div style={{padding:"18px 18px 12px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:17,fontWeight:800}}>{editId?"✏️ Editar Tarefa":"➕ Nova Tarefa"}</div>
                <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",color:C.textMuted,fontSize:22,cursor:"pointer"}}>✕</button>
              </div>
              {/* Name field always visible at top */}
              <label style={lbl}>Nome da Tarefa *</label>
              <input
                autoFocus
                style={{...inp,fontSize:15,fontWeight:600}}
                placeholder="Ex: Renovar contrato de fornecedor"
                value={form.name}
                onChange={e=>setForm(p=>({...p,name:e.target.value}))}
              />
            </div>
            {/* Scrollable body */}
            <div style={{overflowY:"auto",padding:"14px 18px 0",flex:1}}>
              <div style={{marginBottom:14}}><label style={lbl}>💡 Motivo / Contexto (Why)</label><input style={inp} placeholder="Por que esta tarefa é importante?" value={form.why} onChange={e=>setForm(p=>({...p,why:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div><label style={lbl}>📅 Deadline</label><input type="date" style={inp} value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/></div>
                <div><label style={lbl}>Prioridade</label><select style={inp} value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}><option value="alta">🔴 Alta</option><option value="media">🟡 Média</option><option value="baixa">🟢 Baixa</option></select></div>
                <div><label style={lbl}>Status</label><select style={inp} value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}><option value="todo">📋 A Fazer</option><option value="inprogress">⚡ Em Progresso</option><option value="done">✅ Concluído</option></select></div>
                <div><label style={lbl}>Responsável</label><select style={inp} value={form.assignedTo} onChange={e=>setForm(p=>({...p,assignedTo:e.target.value}))}><option value="">Selecionar</option>{employees.filter(e=>e.active).map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>
              </div>
            </div>
            {/* Fixed footer button */}
            <div style={{padding:"12px 18px 28px",borderTop:`1px solid ${C.border}`,flexShrink:0}}>
              <button onClick={save} disabled={!form.name.trim()} style={{width:"100%",padding:"13px",borderRadius:12,fontWeight:800,fontSize:15,cursor:form.name.trim()?"pointer":"not-allowed",border:"none",background:C.gold,color:"#100900",opacity:form.name.trim()?1:0.5}}>
                {editId?"💾 Salvar Alterações":"➕ Criar Tarefa"}
              </button>
            </div>
          </div>
        </div>
      );
    })()}
  </div>);
}

/* ─── EMPLOYEE ─── */
function Employee({user,empData,tasks,taskStatus,setTaskStatus,onLogout,syncBar}){
  const[shift,setShift]=useState("abertura");
  const[tab,setTab]=useState("tarefas");
  const[time,setTime]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

  const myTasks=tasks.filter(t=>t.assignedTo===empData?.id);
  const shiftTasks=myTasks.filter(t=>t.shift===shift);
  const done=shiftTasks.filter(t=>taskStatus[t.id]?.completed).length;
  const pct=shiftTasks.length?Math.round((done/shiftTasks.length)*100):0;
  const pending=shiftTasks.filter(t=>!taskStatus[t.id]?.completed);
  const completed=shiftTasks.filter(t=>taskStatus[t.id]?.completed);

  function completeTask(id,data){
    const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    setTaskStatus(p=>({...p,[id]:{completed:true,completedBy:user,completedAt:now,...data}}));
  }

  return(<div style={{minHeight:"100vh",background:"#000"}}>
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Logo h={28}/>
          <div style={{borderLeft:`1px solid ${C.border}`,paddingLeft:10}}><div style={{fontSize:13,fontWeight:700}}>{user}</div><div style={{fontSize:11,color:C.textMuted}}>{empData?.role||"Colaborador"}</div></div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:C.gold}}>{time.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</span>
          <Btn onClick={onLogout} v="ghost" style={{padding:"7px 12px",fontSize:13}}>Sair</Btn>
        </div>
      </div>
      {empData?.functions?.length>0&&<div style={{padding:"8px 14px 0",display:"flex",gap:6,overflowX:"auto"}}>{empData.functions.map(f=><span key={f} style={{fontSize:11,background:C.goldDim,color:C.goldLight,padding:"3px 10px",borderRadius:20,whiteSpace:"nowrap"}}>{f}</span>)}</div>}
      <div style={{display:"flex",gap:8,padding:"12px 14px 0"}}>
        {["abertura","fechamento"].map(s=><button key={s} onClick={()=>setShift(s)} style={{flex:1,padding:"10px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",border:"none",background:shift===s?C.gold:C.surface,color:shift===s?"#100900":C.textMuted,transition:"all 0.2s"}}>{s==="abertura"?"☀️ Abertura":"🌙 Fechamento"}</button>)}
      </div>
      <div style={{padding:"12px 14px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
          <span style={{color:C.textMuted}}>Minhas tarefas</span>
          <span style={{fontWeight:700,color:pct===100?C.green:C.gold}}>{done}/{shiftTasks.length} · {pct}%</span>
        </div>
        <PBar pct={pct}/>
        {pct===100&&shiftTasks.length>0&&<div style={{textAlign:"center",color:C.green,fontSize:13,fontWeight:700,marginTop:8}} className="fi">🎉 Turno concluído! Ótimo trabalho!</div>}
      </div>
      <div style={{display:"flex",background:C.surface,margin:"10px 14px 0",borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {[{id:"tarefas",l:`⏳ Pendentes (${pending.length})`},{id:"concluidas",l:`✅ Feitas (${completed.length})`}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px",fontSize:12,fontWeight:700,color:tab===t.id?C.gold:C.textMuted,background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?C.gold:"transparent"}`,cursor:"pointer",transition:"all 0.2s"}}>{t.l}</button>)}
      </div>
      <div style={{flex:1,padding:"12px 14px 40px",overflowY:"auto"}}>
        {tab==="tarefas"&&<div className="fi">
          {shift==="fechamento"&&pending.length>0&&<div style={{background:C.goldDim,border:`1px solid ${C.gold}33`,borderRadius:12,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:13,fontWeight:700,color:C.goldLight}}>⚠️ Fechamento</div><div style={{fontSize:12,color:C.textMuted,marginTop:4}}>Registre problemas no campo de ocorrências.</div></div>}
          {myTasks.length===0&&<div style={{textAlign:"center",padding:50}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div style={{fontWeight:700,fontSize:15,marginBottom:8}}>Nenhuma tarefa atribuída</div><div style={{color:C.textMuted,fontSize:13}}>O gerente não atribuiu tarefas para você ainda.</div></div>}
          {pending.length===0&&myTasks.length>0?<div style={{textAlign:"center",padding:50}}><div style={{fontSize:60,marginBottom:14}}>🎉</div><div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Tudo pronto!</div><div style={{color:C.textMuted}}>Todas as suas tarefas estão concluídas.</div></div>
          :pending.map(t=><EmpTaskCard key={t.id} task={t} completeTask={completeTask} isClosing={shift==="fechamento"}/>)}
        </div>}
        {tab==="concluidas"&&<div className="fi">
          {completed.length===0?<div style={{color:C.textMuted,textAlign:"center",padding:40}}>Nenhuma concluída neste turno.</div>
          :completed.map(t=><div key={t.id} style={{...cardS,borderLeft:`3px solid ${C.green}`,opacity:0.88}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontWeight:700,color:C.green,fontSize:14}}>✅ {t.title}</div><span style={{fontSize:12,color:C.textDim}}>{taskStatus[t.id]?.completedAt}</span></div>
            {taskStatus[t.id]?.comment&&<div style={{fontSize:12,color:C.textMuted,marginTop:5}}>💬 {taskStatus[t.id].comment}</div>}
            {taskStatus[t.id]?.problem&&<div style={{fontSize:12,color:C.red,marginTop:5}}>⚠️ {taskStatus[t.id].problem}</div>}
            {taskStatus[t.id]?.hasPhoto&&<div style={{fontSize:12,color:C.blue,marginTop:5}}>📷 Foto anexada</div>}
          </div>)}
        </div>}
      </div>
      {syncBar}
    </div>
  </div>);
}

function EmpTaskCard({task,completeTask,isClosing}){
  const[open,setOpen]=useState(false);
  const[comment,setComment]=useState("");
  const[problem,setProblem]=useState("");
  const[hasPhoto,setHasPhoto]=useState(false);
  const[confirming,setConfirming]=useState(false);
  const[done,setDone]=useState(false);
  const fileRef=useRef();
  const late=isLate(task.time);
  const pc={alta:C.red,media:C.gold,baixa:C.green}[task.priority]||C.gold;

  function doComplete(){setDone(true);setTimeout(()=>completeTask(task.id,{comment,problem,hasPhoto}),280);}

  return(<div style={{...cardS,borderLeft:`3px solid ${late?C.red:pc}`,opacity:done?0.35:1,transition:"opacity 0.3s"}} className="fi">
    <div style={{cursor:"pointer"}} onClick={()=>setOpen(!open)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:5,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:700}}>{task.title}</span>
            {late&&<Badge t="Atrasada" color={C.red} bg={C.redDim}/>}
            <Badge t={task.priority} color={pc} bg={`${pc}22`}/>
          </div>
          <div style={{fontSize:12,color:C.textMuted,display:"flex",gap:10}}><span>⏰ {task.time}</span><span>{CATICON[task.category]} {task.category}</span></div>
        </div>
        <span style={{color:C.textDim,fontSize:15}}>{open?"▲":"▼"}</span>
      </div>
    </div>
    {open&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}} className="fi">
      {task.description&&<div style={{marginBottom:12}}><label style={lbl}>📄 Instruções</label><p style={{fontSize:13,color:C.textMuted,lineHeight:1.7,margin:0}}>{task.description}</p></div>}
      {task.sop&&<div style={{background:C.blueDim,borderRadius:10,padding:"12px 14px",marginBottom:14,border:`1px solid ${C.blue}22`}}><div style={{fontSize:11,fontWeight:700,color:C.blue,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>📋 Procedimento Padrão</div><div style={{fontSize:13,lineHeight:1.7}}>{task.sop}</div></div>}
      {task.videoUrl&&<a href={task.videoUrl} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,fontSize:13,color:C.gold,textDecoration:"none",background:C.goldDim,padding:"9px 16px",borderRadius:9,marginBottom:16,border:`1px solid ${C.gold}44`}}>▶ Assistir vídeo</a>}
      <div style={{marginBottom:12}}>
        <label style={lbl}>📷 Foto {hasPhoto&&<span style={{color:C.green}}>· Anexada ✓</span>}</label>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{if(e.target.files[0])setHasPhoto(true);}}/>
        <button onClick={()=>fileRef.current.click()} style={{padding:"9px 16px",borderRadius:9,background:"transparent",border:`1px solid ${hasPhoto?C.green:C.border}`,color:hasPhoto?C.green:C.textMuted,fontSize:13,cursor:"pointer",fontWeight:600}}>{hasPhoto?"📷 Foto tirada ✓":"📷 Tirar foto"}</button>
      </div>
      <div style={{marginBottom:12}}><label style={lbl}>💬 Comentário</label><textarea style={{...inp,minHeight:68,resize:"vertical"}} placeholder="Observação opcional..." value={comment} onChange={e=>setComment(e.target.value)}/></div>
      {isClosing&&<div style={{marginBottom:16}}><label style={lbl}>⚠️ Ocorrências / Problemas</label><textarea style={{...inp,minHeight:80,resize:"vertical",border:`1px solid ${C.red}33`}} placeholder="Descreva problemas durante a operação..." value={problem} onChange={e=>setProblem(e.target.value)}/></div>}
      {!confirming?<Btn onClick={()=>setConfirming(true)} style={{width:"100%"}}>✓ Marcar como Concluída</Btn>:
      <div style={{background:C.greenDim,borderRadius:12,padding:14,border:`1px solid ${C.green}33`}}>
        <div style={{fontSize:14,fontWeight:700,color:C.green,marginBottom:4}}>Confirmar conclusão?</div>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:12}}>Será registrado com seu nome e horário.</div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={doComplete} style={{flex:1,background:C.green,color:"#fff"}}>✓ Confirmar</Btn>
          <Btn onClick={()=>setConfirming(false)} v="ghost" style={{flex:1}}>Cancelar</Btn>
        </div>
      </div>}
    </div>}
  </div>);
}

/* ─── APP ROOT ─── */
function App(){
  const[screen,setScreen]=useState("init");
  const[user,setUser]=useState(null);
  const[empData,setEmpData]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState("");
  const[syncErr,setSyncErr]=useState("");
  const[hasSP,setHasSP]=useState(false);
  const[spInfo,setSPInfo]=useState(null); // {siteId,listId,itemId}

  const saved=lsLoad();
  const today=new Date().toDateString();
  const[tasks,setTasks]=useState(saved?.tasks||INIT_TASKS);
  const[taskStatus,setTaskStatus]=useState(saved?.savedDate===today?(saved?.taskStatus||{}):{});
  const[employees,setEmployees]=useState(saved?.employees||INIT_EMPLOYEES);
  const[mgmtTasks,setMgmtTasks]=useState(saved?.mgmtTasks||[]);

  const state=()=>({tasks,taskStatus,employees,mgmtTasks});

  // Init
  useEffect(()=>{
    const cfg=spCfgLoad();
    if(cfg?.clientId&&cfg?.siteId&&cfg?.listId){
      msalInit(cfg.clientId)
        .then(()=>{setHasSP(true);setSPInfo({siteId:cfg.siteId,listId:cfg.listId,itemId:null});return loadFromSP(cfg.siteId,cfg.listId);})
        .catch(()=>{})
        .finally(()=>setScreen("login"));
    } else {
      setScreen("spsetup");
    }
  },[]);

  // Auto save locally
  useEffect(()=>{lsSave(state());},[tasks,taskStatus,employees,mgmtTasks]);

  // Auto sync every 45s
  useEffect(()=>{
    if(!hasSP)return;
    const t=setInterval(syncUp,45000);
    return()=>clearInterval(t);
  },[hasSP,tasks,taskStatus,employees,mgmtTasks]);

  async function loadFromSP(siteId, listId){
    setSyncing(true);setSyncErr("");
    try{
      const result=await spRead(siteId,listId);
      if(result){
        const r=result.data;
        setTasks(r.tasks||INIT_TASKS);
        setTaskStatus(r.savedDate===new Date().toDateString()?(r.taskStatus||{}):{});
        setEmployees(r.employees||INIT_EMPLOYEES);
        setMgmtTasks(r.mgmtTasks||[]);
        lsSave(r);
        setSPInfo(p=>({...p,itemId:result.itemId}));
      }
      setLastSync(new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
    }catch(e){setSyncErr(e.message);}
    setSyncing(false);
  }

  async function syncUp(){
    if(!hasSP||!spInfo)return;
    setSyncing(true);setSyncErr("");
    try{
      const newItemId=await spWrite(spInfo.siteId,spInfo.listId,state(),spInfo.itemId);
      if(newItemId)setSPInfo(p=>({...p,itemId:newItemId}));
      setLastSync(new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
    }catch(e){setSyncErr(e.message);}
    setSyncing(false);
  }

  function wrap(setter){
    return function(val){
      setter(val);
      if(hasSP)setTimeout(syncUp,700);
    };
  }

  function handleLogin(role,name,emp){setUser({role,name});setEmpData(emp);setScreen(role);}
  function handleLogout(){if(hasSP)syncUp();setUser(null);setEmpData(null);setScreen("login");}

  const syncBar=(
    <div style={{background:"#050505",borderTop:`1px solid ${C.border}`,padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11}}>
      <span style={{color:syncErr?C.red:syncing?C.gold:C.textDim}}>
        {syncErr?"❌ "+syncErr:syncing?"🔄 Sincronizando...":(lastSync?`☁️ SharePoint · ${lastSync}`:"📱 Offline")}
      </span>
      <div style={{display:"flex",gap:10}}>
        {hasSP&&spInfo&&<button onClick={()=>loadFromSP(spInfo.siteId,spInfo.listId)} style={{background:"none",border:"none",color:C.blue,fontSize:11,cursor:"pointer"}}>↺ Atualizar</button>}
        {hasSP&&<button onClick={syncUp} style={{background:"none",border:"none",color:C.gold,fontSize:11,cursor:"pointer"}}>↑ Salvar</button>}
      </div>
    </div>
  );

  if(screen==="init")return<div style={{minHeight:"100vh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:C.textDim,fontSize:14}}>Carregando...</div></div>;
  if(screen==="spsetup")return<SPSetup onSave={cfg=>{setHasSP(true);setSPInfo({siteId:cfg.siteId,listId:cfg.listId,itemId:null});setScreen("login");loadFromSP(cfg.siteId,cfg.listId);}} onSkip={()=>setScreen("login")}/>;
  if(screen==="login")return<>{syncBar}<Login onLogin={handleLogin} employees={employees}/></>;
  if(screen==="gerente")return<Manager user={user} tasks={tasks} setTasks={wrap(setTasks)} taskStatus={taskStatus} setTaskStatus={wrap(setTaskStatus)} employees={employees} setEmployees={wrap(setEmployees)} mgmtTasks={mgmtTasks} setMgmtTasks={wrap(setMgmtTasks)} onLogout={handleLogout} syncBar={syncBar}/>;
  if(screen==="colaborador")return<Employee user={user.name} empData={empData} tasks={tasks} taskStatus={taskStatus} setTaskStatus={wrap(setTaskStatus)} onLogout={handleLogout} syncBar={syncBar}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
